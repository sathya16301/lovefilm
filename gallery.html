<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>lovefilm — gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --cream: #faf6f1; --rose: #c17b82; --gold: #d4a853;
      --dark: #3d2b2b; --muted: #9e7b7b;
      --card-bg: rgba(255,255,255,0.7);
    }
    body {
      background-color: var(--cream);
      background-image: radial-gradient(ellipse at 20% 50%, rgba(232,180,184,0.18) 0%, transparent 60%);
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
      min-height: 100vh;
    }
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 3rem;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(193,123,130,0.15);
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.4rem; color: var(--dark); }
    .back-btn {
      background: transparent; border: 1.5px solid var(--rose);
      color: var(--rose); border-radius: 99px;
      padding: 0.4rem 1rem; font-size: 0.78rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(193,123,130,0.1); }
    .hero {
      text-align: center;
      padding: 3rem 2rem 1.5rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: var(--dark);
    }
    .hero h1 em { color: var(--rose); font-style: italic; }
    .hero p { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
      padding: 1.5rem 3rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .gallery-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .gallery-item img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .gallery-item-footer {
      padding: 0.6rem 0.8rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .gallery-item-date { font-size: 0.7rem; color: var(--muted); }
    .delete-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 0.75rem; transition: color 0.2s;
    }
    .delete-btn:hover { color: var(--rose); }
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .empty-state .big { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); margin-bottom: 0.5rem; }
    .open-booth-btn {
      background: var(--rose); color: white; border: none;
      border-radius: 99px; padding: 0.75rem 2rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      cursor: pointer; margin-top: 1.5rem;
      transition: transform 0.2s, opacity 0.2s;
    }
    .open-booth-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .clear-btn {
      background: none; border: 1px solid rgba(193,123,130,0.3);
      color: var(--muted); border-radius: 99px;
      padding: 0.4rem 1rem; font-size: 0.75rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s; margin-left: 1rem;
    }
    .clear-btn:hover { border-color: var(--rose); color: var(--rose); }
  </style>
</head>
<body>
  <nav>
    <span class="nav-logo">lovefilm</span>
    <div style="display:flex;align-items:center">
      <button class="clear-btn" onclick="clearGallery()">clear all</button>
      <button class="back-btn" style="margin-left:0.5rem" onclick="window.location.href='booth.html'">📷 open booth</button>
    </div>
  </nav>

  <div class="hero">
    <h1>your <em>darling</em> moments</h1>
    <p>all your lovefilm captures in one place 🎀</p>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>

  <script>
    function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      let photos = [];
      try { photos = JSON.parse(localStorage.getItem('lovefilm_gallery') || '[]'); } catch(e) {}

      if (!photos.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="big">🎞️</div>
            <h3>no memories yet, darling</h3>
            <p>head to the booth and capture your first moment!</p>
            <button class="open-booth-btn" onclick="window.location.href='booth.html'">📷 open the booth</button>
          </div>`;
        return;
      }

      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const date = new Date(photo.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        item.innerHTML = `
          <img src="${photo.src}" alt="lovefilm photo"/>
          <div class="gallery-item-footer">
            <span class="gallery-item-date">🎞️ ${date}</span>
            <button class="delete-btn" onclick="deletePhoto(${i})">✕ delete</button>
          </div>`;
        item.querySelector('img').addEventListener('click', () => downloadPhoto(photo.src, i));
        grid.appendChild(item);
      });
    }

    function deletePhoto(i) {
      let photos = JSON.parse(localStorage.getItem('lovefilm_gallery') || '[]');
      photos.splice(i, 1);
      localStorage.setItem('lovefilm_gallery', JSON.stringify(photos));
      loadGallery();
    }

    function clearGallery() {
      if (confirm('Clear all photos?')) {
        localStorage.removeItem('lovefilm_gallery');
        loadGallery();
      }
    }

    function downloadPhoto(src, i) {
      const link = document.createElement('a');
      link.download = 'lovefilm-' + i + '.png';
      link.href = src;
      link.click();
    }
    
    loadGallery();
  </script>
</body>
</html>
